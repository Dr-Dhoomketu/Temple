<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5a0a0a"/>
      <stop offset="100%" stop-color="#2d0404"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="40%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9A7B1C"/>
    </linearGradient>
  </defs>
  <!-- Deep maroon circle background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Thin gold ring border -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- OM symbol rendered as text -->
  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="serif"
    font-size="34"
    font-weight="bold"
    fill="url(#gold)"
  >ॐ</text>
</svg>
